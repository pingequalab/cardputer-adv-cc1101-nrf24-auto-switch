# brucePins.conf — CC1101 + NRF24 Dual-Radio Auto-Switching
# For M5Stack Cardputer ADV running Bruce firmware
#
# Project: https://github.com/PINGEQUA/cardputer-adv-cc1101-nrf24-auto-switch
# License: MIT (see LICENSE)
#
# IMPORTANT: Save this file to BOTH the SD card AND LittleFS.
# Bruce reads from one or the other depending on firmware version.
# Editing only one is unreliable.
#
# After saving, restart the Cardputer ADV.

# ────────────────────────────────────────────────────────
# CC1101 (Sub-GHz: 300–928 MHz depending on antenna)
# ────────────────────────────────────────────────────────
# cs  = GPIO 13 → CC1101 CSN (chip select)
# io0 = GPIO  5 → CC1101 GDO0 (interrupt / status pin)

[cc1101]
cs  = 13
io0 = 5

# ────────────────────────────────────────────────────────
# NRF24L01+ (2.4 GHz: 2400–2525 MHz)
# ────────────────────────────────────────────────────────
# cs  = GPIO 6 → NRF24 CSN (chip select)
# io0 = GPIO 4 → NRF24 CE  (radio state machine control)
#
# Note: For NRF24, Bruce's `io0` field maps to CE, not IRQ.
# IRQ is left floating; firmware uses polling mode.

[nrf24]
cs  = 6
io0 = 4

# ────────────────────────────────────────────────────────
# Shared SPI bus (handled by Bruce internally, listed here for reference)
# ────────────────────────────────────────────────────────
# SCK  = GPIO 40
# MOSI = GPIO 14
# MISO = GPIO 39
